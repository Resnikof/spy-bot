<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Legal Archive</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.0/axios.min.js"></script>
<style>
  :root {
    --bg:       #0e0e12;
    --surface:  #16161e;
    --card:     #1e1e2a;
    --border:   #2a2a3a;
    --accent:   #7c6af7;
    --accent2:  #56cfb2;
    --red:      #f75f6a;
    --yellow:   #f7c96a;
    --text:     #e8e8f0;
    --muted:    #6b6b82;
    --radius:   14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 12px;
  }
  .header-icon { font-size: 28px; }
  .header-title { font-size: 18px; font-weight: 700; letter-spacing: .3px; }
  .header-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; gap: 8px; }
  .badge {
    background: var(--accent); color: #fff;
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
  }
  .badge.red { background: var(--red); }

  /* ── NAV TABS ── */
  .tabs {
    display: flex; background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 1; min-width: 80px; padding: 13px 8px;
    text-align: center; font-size: 13px; font-weight: 500;
    color: var(--muted); cursor: pointer; border: none;
    background: none; transition: all .2s;
    border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover  { color: var(--text); }

  /* ── MAIN ── */
  .container { padding: 16px; max-width: 700px; margin: 0 auto; }

  /* ── SEARCH ── */
  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-wrap input {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    padding: 11px 16px 11px 40px; font-size: 14px; outline: none;
    transition: border .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .ico {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 16px; pointer-events: none;
  }

  /* ── CARDS ── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    margin-bottom: 10px; cursor: pointer;
    transition: border-color .2s, transform .1s;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--accent); border-radius: 3px 0 0 3px;
  }
  .card.red::before   { background: var(--red); }
  .card.green::before { background: var(--accent2); }
  .card.yellow::before{ background: var(--yellow); }
  .card:hover { border-color: var(--accent); transform: translateX(2px); }

  .card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .card-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; flex-shrink: 0;
    color: #fff;
  }
  .card-name  { font-size: 15px; font-weight: 600; }
  .card-meta  { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .card-right { margin-left: auto; text-align: right; }
  .card-count {
    background: var(--accent); color: #fff;
    padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600;
  }
  .card-time  { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .card-preview {
    font-size: 13px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── MESSAGES ── */
  .msg-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .back-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px;
    padding: 8px 14px; font-size: 13px; cursor: pointer;
    transition: background .2s;
  }
  .back-btn:hover { background: var(--border); }

  .msg-bubble {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
    margin-bottom: 8px; position: relative;
  }
  .msg-bubble.deleted {
    border-color: var(--red); background: rgba(247,95,106,.07);
  }
  .msg-bubble.edited {
    border-color: var(--yellow); background: rgba(247,201,106,.07);
  }
  .msg-from  { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
  .msg-text  { font-size: 14px; line-height: 1.5; word-break: break-word; }
  .msg-time  { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .msg-label {
    position: absolute; top: 10px; right: 12px;
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 8px; letter-spacing: .3px;
  }
  .msg-label.del { background: rgba(247,95,106,.2); color: var(--red); }
  .msg-label.edit{ background: rgba(247,201,106,.2); color: var(--yellow); }

  /* ── EVENTS ── */
  .event-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    margin-bottom: 10px;
  }
  .event-card.del  { border-left: 3px solid var(--red); }
  .event-card.edit { border-left: 3px solid var(--yellow); }
  .event-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  .event-title.del  { color: var(--red); }
  .event-title.edit { color: var(--yellow); }
  .event-row { font-size: 13px; color: var(--muted); margin-bottom: 3px; }
  .event-row span { color: var(--text); }
  .event-orig {
    margin-top: 8px; padding: 8px 10px;
    background: var(--bg); border-radius: 8px;
    font-size: 13px; color: var(--muted);
    border-left: 2px solid var(--border);
  }

  /* ── STATS ── */
  .stats-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 12px; margin-bottom: 16px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    text-align: center;
  }
  .stat-num  { font-size: 28px; font-weight: 800; color: var(--accent); }
  .stat-label{ font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* ── EMPTY ── */
  .empty {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; }

  /* ── LOADER ── */
  .loader {
    display: flex; justify-content: center; padding: 40px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── DIFF ── */
  .diff-old { color: var(--red);    text-decoration: line-through; }
  .diff-new { color: var(--accent2); }

  /* scrollbar */
  ::-webkit-scrollbar       { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-icon">🛡</div>
  <div>
    <div class="header-title">Legal Archive</div>
    <div class="header-sub" id="hSub">Загрузка...</div>
  </div>
  <div class="header-right">
    <span class="badge red" id="evBadge" style="display:none">⚠️ 0</span>
    <span class="badge" id="chatBadge">💬 0</span>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="showTab('chats')">💬 Чаты</button>
  <button class="tab" onclick="showTab('events')">⚠️ События</button>
  <button class="tab" onclick="showTab('stats')">📊 Статистика</button>
</div>

<!-- CONTENT -->
<div class="container" id="app"></div>

<script>
// ─────────────────────────────────────────
//  CONFIG — измени BASE_URL на адрес своего сервера
// ─────────────────────────────────────────
const BASE_URL = "http://localhost:8080";

// Получаем uid из Telegram WebApp или из URL
const tg  = window.Telegram?.WebApp;
const uid  = tg?.initDataUnsafe?.user?.id
           || new URLSearchParams(location.search).get("uid")
           || "demo";

tg?.expand();
tg?.setHeaderColor("#0e0e12");

// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let state = {
  tab:    "chats",
  chats:  [],
  events: [],
  msgs:   [],
  openChat: null,
  search: "",
};

// ─────────────────────────────────────────
//  API (подключается к Flask серверу)
//  В демо-режиме генерирует тестовые данные
// ─────────────────────────────────────────
async function api(path) {
  try {
    const r = await axios.get(BASE_URL + path, { timeout: 4000 });
    return r.data;
  } catch {
    return null; // fallback → demo data
  }
}

function demoChats() {
  return [
    { chat_id: 1, name: "Алексей Иванов",   cnt: 142, last: "2025-03-10 14:22:00 UTC" },
    { chat_id: 2, name: "Рабочий чат",       cnt: 89,  last: "2025-03-11 09:15:00 UTC" },
    { chat_id: 3, name: "Мария Смирнова",    cnt: 37,  last: "2025-03-11 21:40:00 UTC" },
    { chat_id: 4, name: "Поддержка проекта", cnt: 210, last: "2025-03-12 08:00:00 UTC" },
  ];
}

function demoEvents() {
  return [
    { type:"deleted", chat:"Алексей Иванов", who:"Алексей", at:"2025-03-12 10:01", orig:"Ладно, забудь об этом" },
    { type:"edited",  chat:"Рабочий чат",    who:"Дмитрий", at:"2025-03-11 18:44", orig:"Встреча в пятницу", new_text:"Встреча перенесена на понедельник" },
    { type:"deleted", chat:"Мария Смирнова", who:"Мария",   at:"2025-03-11 22:10", orig:"Я не говорила этого" },
    { type:"edited",  chat:"Рабочий чат",    who:"Сергей",  at:"2025-03-10 16:30", orig:"Бюджет 50к",        new_text:"Бюджет 30к" },
  ];
}

function demoMsgs(chatName) {
  return [
    { name: chatName, uname:"@user1", text:"Привет! Как дела?",           media:"", at:"2025-03-10 10:00" },
    { name:"Я",       uname:"@me",    text:"Всё хорошо, спасибо!",        media:"", at:"2025-03-10 10:01" },
    { name: chatName, uname:"@user1", text:"Нужно обсудить проект",        media:"", at:"2025-03-10 10:05" },
    { name: chatName, uname:"@user1", text:"[УДАЛЕНО]",                   media:"", at:"2025-03-10 10:10", deleted:true },
    { name:"Я",       uname:"@me",    text:"Хорошо, давай созвонимся",    media:"", at:"2025-03-10 10:11" },
    { name: chatName, uname:"@user1", text:"📷 фото",                     media:"📷 фото", at:"2025-03-10 10:15" },
    { name: chatName, uname:"@user1", text:"Жду в 14:00 [ред.]",          media:"", at:"2025-03-10 10:20", edited:true },
  ];
}

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
async function init() {
  const [chats, events] = await Promise.all([
    api(`/api/chats/${uid}`),
    api(`/api/events/${uid}`),
  ]);
  state.chats  = chats  || demoChats();
  state.events = events || demoEvents();

  document.getElementById("hSub").textContent =
    uid === "demo" ? "Демо-режим" : `ID: ${uid}`;
  document.getElementById("chatBadge").textContent =
    `💬 ${state.chats.length}`;

  if (state.events.length) {
    const b = document.getElementById("evBadge");
    b.style.display = "";
    b.textContent = `⚠️ ${state.events.length}`;
  }
  render();
}

// ─────────────────────────────────────────
//  TAB SWITCH
// ─────────────────────────────────────────
function showTab(t) {
  state.tab = t; state.openChat = null; state.search = "";
  document.querySelectorAll(".tab").forEach((el, i) => {
    el.classList.toggle("active", ["chats","events","stats"][i] === t);
  });
  render();
}

// ─────────────────────────────────────────
//  RENDER ROUTER
// ─────────────────────────────────────────
function render() {
  if (state.openChat !== null) { renderMsgs(); return; }
  if (state.tab === "chats")  { renderChats();  return; }
  if (state.tab === "events") { renderEvents(); return; }
  if (state.tab === "stats")  { renderStats();  return; }
}

// ─────────────────────────────────────────
//  CHATS LIST
// ─────────────────────────────────────────
function renderChats() {
  const app = document.getElementById("app");
  const q   = state.search.toLowerCase();
  const list = state.chats.filter(c =>
    !q || c.name.toLowerCase().includes(q)
  );

  app.innerHTML = `
    <div class="search-wrap">
      <span class="ico">🔍</span>
      <input placeholder="Поиск по чатам..." value="${state.search}"
             oninput="state.search=this.value;renderChats()"/>
    </div>
    ${list.length === 0 ? empty("💬","Чатов пока нет") : list.map(chatCard).join("")}
  `;
}

function chatCard(c) {
  const initials = (c.name||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const date = c.last ? c.last.split(" ")[0] : "";
  return `
  <div class="card" onclick="openChat(${c.chat_id},'${esc(c.name)}')">
    <div class="card-head">
      <div class="card-avatar">${initials}</div>
      <div>
        <div class="card-name">${esc(c.name)}</div>
        <div class="card-meta">ID: ${c.chat_id}</div>
      </div>
      <div class="card-right">
        <div class="card-count">${c.cnt}</div>
        <div class="card-time">${date}</div>
      </div>
    </div>
    <div class="card-preview">💬 ${c.cnt} сообщений в архиве</div>
  </div>`;
}

// ─────────────────────────────────────────
//  MESSAGES
// ─────────────────────────────────────────
async function openChat(chatId, chatName) {
  state.openChat = chatId;
  document.getElementById("app").innerHTML = `<div class="loader"><div class="spinner"></div></div>`;

  const data = await api(`/api/msgs/${uid}/${chatId}`);
  state.msgs = data || demoMsgs(chatName);
  state._chatName = chatName;
  renderMsgs();
}

function renderMsgs() {
  const q    = state.search.toLowerCase();
  const msgs = state.msgs.filter(m =>
    !q || (m.text||"").toLowerCase().includes(q)
  );
  const delCnt  = msgs.filter(m => m.deleted).length;
  const editCnt = msgs.filter(m => m.edited).length;

  document.getElementById("app").innerHTML = `
    <div class="msg-header">
      <button class="back-btn" onclick="state.openChat=null;state.search='';render()">◀ Назад</button>
      <div>
        <div style="font-weight:700">${esc(state._chatName)}</div>
        <div style="font-size:12px;color:var(--muted)">
          ${msgs.length} сообщ.
          ${delCnt  ? `&nbsp;🚨 ${delCnt} удал.`  : ""}
          ${editCnt ? `&nbsp;✏️ ${editCnt} ред.`  : ""}
        </div>
      </div>
    </div>
    <div class="search-wrap">
      <span class="ico">🔍</span>
      <input placeholder="Поиск по сообщениям..." value="${state.search}"
             oninput="state.search=this.value;renderMsgs()"/>
    </div>
    ${msgs.length===0 ? empty("📭","Сообщений не найдено") :
      [...msgs].reverse().map(msgBubble).join("")}
  `;
}

function msgBubble(m) {
  const cls   = m.deleted ? "deleted" : m.edited ? "edited" : "";
  const label = m.deleted
    ? `<span class="msg-label del">УДАЛЕНО</span>`
    : m.edited
    ? `<span class="msg-label edit">ИЗМЕНЕНО</span>` : "";
  const content = m.media
    ? `<span style="color:var(--muted)">${m.media}</span>`
    : highlight(esc(m.text||"—"), state.search);
  return `
  <div class="msg-bubble ${cls}">
    ${label}
    <div class="msg-from">${esc(m.name)} <span style="color:var(--muted);font-weight:400">${esc(m.uname||"")}</span></div>
    <div class="msg-text">${content}</div>
    <div class="msg-time">🕐 ${m.at}</div>
  </div>`;
}

// ─────────────────────────────────────────
//  EVENTS
// ─────────────────────────────────────────
function renderEvents() {
  const app = document.getElementById("app");
  const q   = state.search.toLowerCase();
  const evs = state.events.filter(e =>
    !q || (e.orig||"").toLowerCase().includes(q) || (e.chat||"").toLowerCase().includes(q)
  );

  app.innerHTML = `
    <div class="search-wrap">
      <span class="ico">🔍</span>
      <input placeholder="Поиск по событиям..." value="${state.search}"
             oninput="state.search=this.value;renderEvents()"/>
    </div>
    ${evs.length===0 ? empty("✅","Подозрительных событий нет") : evs.map(eventCard).join("")}
  `;
}

function eventCard(e) {
  const isDel = e.type === "deleted";
  const icon  = isDel ? "🚨" : "✏️";
  const label = isDel ? "УДАЛЕНО" : "ИЗМЕНЕНО";
  let diffHtml = "";
  if (!isDel && e.new_text) {
    diffHtml = `
      <div class="event-orig" style="margin-top:6px">
        <span class="diff-old">${esc(e.orig||"")}</span>
        <span style="color:var(--muted)"> → </span>
        <span class="diff-new">${esc(e.new_text)}</span>
      </div>`;
  } else if (e.orig) {
    diffHtml = `<div class="event-orig">${esc(e.orig)}</div>`;
  }
  return `
  <div class="event-card ${isDel?'del':'edit'}">
    <div class="event-title ${isDel?'del':'edit'}">${icon} ${label}</div>
    <div class="event-row">💬 Чат: <span>${esc(e.chat)}</span></div>
    <div class="event-row">👤 Кто: <span>${esc(e.who)}</span></div>
    <div class="event-row">🕐 Когда: <span>${esc(e.at)}</span></div>
    ${diffHtml}
  </div>`;
}

// ─────────────────────────────────────────
//  STATS
// ─────────────────────────────────────────
function renderStats() {
  const totalMsgs = state.chats.reduce((s,c) => s+c.cnt, 0);
  const delCnt    = state.events.filter(e=>e.type==="deleted").length;
  const editCnt   = state.events.filter(e=>e.type==="edited").length;
  const chatCnt   = state.chats.length;

  document.getElementById("app").innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num">${totalMsgs}</div>
        <div class="stat-label">Сообщений в архиве</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--accent2)">${chatCnt}</div>
        <div class="stat-label">Чатов отслеживается</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--red)">${delCnt}</div>
        <div class="stat-label">Удалённых сообщений</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--yellow)">${editCnt}</div>
        <div class="stat-label">Изменённых сообщений</div>
      </div>
    </div>
    <div class="card green" style="cursor:default">
      <div class="card-head">
        <div class="card-avatar">📊</div>
        <div>
          <div class="card-name">Активность по чатам</div>
          <div class="card-meta">Топ переписок</div>
        </div>
      </div>
      ${state.chats.slice(0,5).map((c,i)=>`
        <div style="display:flex;align-items:center;gap:10px;margin-top:10px">
          <span style="color:var(--muted);font-size:13px;width:20px">#${i+1}</span>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600">${esc(c.name)}</div>
            <div style="height:4px;background:var(--border);border-radius:2px;margin-top:4px">
              <div style="height:4px;background:var(--accent);border-radius:2px;width:${Math.min(100,Math.round(c.cnt/totalMsgs*100*state.chats.length))}%"></div>
            </div>
          </div>
          <span style="font-size:12px;color:var(--muted)">${c.cnt}</span>
        </div>
      `).join("")}
    </div>
    <div style="text-align:center;padding:20px;color:var(--muted);font-size:12px">
      🛡 Legal Archive Bot &nbsp;•&nbsp; Все данные защищены
    </div>
  `;
}

// ─────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────
function empty(icon, text) {
  return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-text">${text}</div></div>`;
}
function esc(s="") {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`, "gi");
  return text.replace(re, `<mark style="background:rgba(124,106,247,.3);border-radius:3px">$1</mark>`);
}

init();
</script>
